services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trace
      POSTGRES_USER: trace_ops
      POSTGRES_PASSWORD: trace_ops_dev
    ports:
      - "5432:5432"
    volumes:
      - trace_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trace_ops -d trace"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgresql://trace_ops:trace_ops_dev@db:5432/trace
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

volumes:
  trace_data:
