version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: trace-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: trace
      POSTGRES_USER: trace_admin
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-trace_admin_dev}
    ports:
      - "5432:5432"
    volumes:
      - trace-pgdata:/var/lib/postgresql/data
      - ./migrations/000_bootstrap.sql:/docker-entrypoint-initdb.d/001_bootstrap.sql
      - ./migrations/002_role_passwords.sql:/docker-entrypoint-initdb.d/002_passwords.sql
      - ./migrations/003_tables.sql:/docker-entrypoint-initdb.d/003_tables.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trace_admin -d trace"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  trace-pgdata:
